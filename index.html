<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口碑评论生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-h:#4338ca;--bg:#f5f5f5;
  --card:#fff;--text:#333;--text2:#666;--text3:#999;
  --border:#e0e0e0;--success:#10b981;--danger:#e53e3e;
  --warning:#f59e0b;--info:#3b82f6;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
/* header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;gap:8px;flex-wrap:wrap}
/* nav tabs */
.nav-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px;gap:0}
.nav-tab{padding:12px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:500;transition:all .2s}
.nav-tab:hover{color:var(--primary)}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* section */
.section{display:none}
.section.active{display:block}
/* buttons */
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-h)}
.btn-o{border:1px solid var(--border);background:var(--card);color:#555}.btn-o:hover{background:#fafafa}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{opacity:.9}
.btn-d{background:var(--card);color:var(--danger);border:1px solid #fecaca}.btn-d:hover{background:#fef2f2}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px;font-size:12px}.btn-ghost:hover{background:#f0f0f0}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:#fff;color:#555;transition:all .2s}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.d{color:var(--danger);border-color:#fecaca}.btn-sm.d:hover{background:#fef2f2}
.btn-sm.s{color:var(--success);border-color:#bbf7d0}.btn-sm.s:hover{background:#f0fdf4}
.btn-sm.i{color:var(--info);border-color:#bfdbfe}.btn-sm.i:hover{background:#eff6ff}
.btn-sm.w{color:var(--warning);border-color:#fde68a}.btn-sm.w:hover{background:#fffbeb}
.btn-pdf{background:#dc2626;color:#fff;padding:5px 10px;font-size:11px;border-radius:4px;border:none;cursor:pointer}
/* cards */
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
/* select bar */
.select-bar{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.select-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.select-label{font-size:13px;color:var(--text2);white-space:nowrap;font-weight:500}
.product-chips{display:flex;gap:7px;flex-wrap:wrap}
.product-chip{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:2px solid var(--border);background:#fff;color:#555;transition:all .2s;font-weight:500;position:relative}
.product-chip:hover{border-color:#bbb}
.product-chip.mine.selected{border-color:var(--primary);background:#f0efff;color:var(--primary)}
.product-chip.comp.selected{border-color:var(--warning);background:#fffbeb;color:#b45309}
.product-chip .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle}
.product-chip.mine .dot{background:var(--primary)}
.product-chip.comp .dot{background:var(--warning)}
.product-chip .tag{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px}
.product-chip.mine .tag{background:#f0efff;color:var(--primary)}
.product-chip.comp .tag{background:#fffbeb;color:#b45309}
.no-product{font-size:13px;color:#bbb}
.info-row{font-size:12px;color:var(--text2);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
.info-row span{display:flex;align-items:center;gap:3px}
/* controls */
.controls-row{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.tone-group{display:flex;align-items:center;gap:8px;flex:1;min-width:180px}
.tone-slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#ff6b6b,#ffa502,#7c5ce7,#2c3e50);cursor:pointer}
.tone-slider::-webkit-slider-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--primary);cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.15)}
.tone-ends{display:flex;justify-content:space-between;font-size:10px;color:#ccc;margin-top:2px}
.purchase-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.toggle-btn{padding:6px 14px;font-size:13px;cursor:pointer;border:none;background:#fff;color:#999;transition:all .2s}
.toggle-btn:first-child{border-right:1px solid var(--border)}
.toggle-btn.active{background:var(--primary);color:#fff}
/* platforms */
.platform-btns{display:flex;gap:10px;margin-bottom:16px}
.platform-btn{flex:1;padding:14px 0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;color:#fff}
.platform-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.bili-btn{background:linear-gradient(135deg,#fb7299,#e84c7a)}
.douyin-btn{background:linear-gradient(135deg,#1a1a2e,#000);border:2px solid #fe2c55}
.douyin-btn:hover{border-color:#ff5c85;box-shadow:0 6px 20px rgba(254,44,85,.3)}
.xhs-btn{background:linear-gradient(135deg,#ff2442,#e0203a)}
/* link input */
.link-row{display:flex;gap:8px;margin-bottom:10px}
.link-row input{flex:1}
.link-status{font-size:12px;color:var(--text2);margin-bottom:10px;padding:6px 10px;background:#f9f9f9;border-radius:6px;display:none}
.link-status.show{display:block}
.link-status.ok{color:var(--success);background:#f0fdf4}
.link-status.err{color:var(--danger);background:#fef2f2}
.link-status.loading{color:var(--text2);background:#f9f9f9}
/* result */
.result-area{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);min-height:200px;margin-bottom:14px}
.result-header{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;color:#fff}
.b-bili{background:#fb7299}.b-douyin{background:#1a1a2e;border:1px solid #fe2c55;color:#fe2c55}.b-xhs{background:#ff2442}
.b-green{background:var(--success)}.b-yellow{background:var(--warning)}.b-blue{background:var(--info)}
.empty{text-align:center;padding:50px 20px;color:#ccc;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
.result-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
/* comment styles */
.bc{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start;position:relative}
.bc:last-child{border-bottom:none}
.bc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;color:#fff}
.bc-name{font-size:13px;color:#61666d;margin-bottom:2px}
.bc-text{font-size:13px;color:#18191c;line-height:1.65}
.bc-meta{font-size:11px;color:#9499a0;margin-top:4px;display:flex;gap:14px}
.dc{display:flex;gap:10px;padding:14px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.dc:last-child{border-bottom:none}
.dc-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:#fff}
.dc-name{font-size:12px;color:#999;margin-bottom:2px}
.dc-text{font-size:14px;color:#333;line-height:1.5}
.dc-meta{font-size:11px;color:#bbb;margin-top:5px;display:flex;justify-content:space-between}
.dc-heart{color:#ccc;cursor:pointer}
.xc{padding:12px 0;border-bottom:1px solid #f5f5f5}
.xc:last-child{border-bottom:none}
.xc-header{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.xc-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;color:#fff}
.xc-name{font-size:12px;color:#999}
.xc-text{font-size:14px;color:#333;line-height:1.7;padding-left:36px}
.xc-meta{font-size:11px;color:#bbb;margin-top:4px;padding-left:36px;display:flex;gap:10px}
.cc-wrap{position:relative}
.copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;font-size:11px;border-radius:4px;border:1px solid var(--border);background:#fff;color:#999;cursor:pointer;opacity:0;transition:opacity .2s}
.cc-wrap:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--primary);border-color:var(--primary)}
/* management */
.mgr-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.mgr-tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.mgr-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-full{width:100%;margin-bottom:10px}
.form-g{margin-bottom:10px}
.form-g label{display:block;font-size:12px;font-weight:500;color:#777;margin-bottom:4px}
.form-g input,.form-g textarea,.form-g select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-g input:focus,.form-g textarea:focus,.form-g select:focus{border-color:var(--primary)}
.form-g textarea{resize:vertical;min-height:60px}
.form-g select{background:#fff}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
textarea{min-height:50px;resize:vertical}
/* data list */
.data-item{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fff;transition:all .2s}
.data-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.data-item.mine{border-left:3px solid var(--primary)}
.data-item.comp{border-left:3px solid var(--warning)}
.data-item.info{flex:1}
.data-item-title{font-size:14px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.data-item-title .sub{font-size:12px;font-weight:400;color:var(--text2)}
.data-item-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:4px;max-width:500px}
.data-item-meta{font-size:11px;color:#bbb;margin-top:3px}
.data-item-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.data-item-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.tag-a{background:#f0efff;color:var(--primary)}.tag-i{background:#fff7e6;color:#b45309}.tag-p{background:#f0fdf4;color:#166534}.tag-d{background:#fef2f2;color:#991b1b}
/* file upload */
.file-upload{display:flex;align-items:center;gap:8px;margin-top:6px}
.file-upload input[type=file]{font-size:12px;border:none;background:transparent}
.mat-list{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.mat-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#f5f5f5;border-radius:20px;font-size:11px;color:#555}
.mat-chip .del{color:#ccc;cursor:pointer;font-size:13px}.mat-chip .del:hover{color:var(--danger)}
/* feedback */
.fb-stat{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.fb-stat-item{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#f9f9f9;border-radius:8px;font-size:13px}
.fb-stat-item .num{font-size:18px;font-weight:700;color:var(--primary)}
/* settings */
.settings-box{background:#fffbeb;border:2px solid var(--warning);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.settings-box h4{color:var(--warning);font-size:14px;margin-bottom:6px}
.settings-box p{font-size:12px;color:#666;margin-bottom:12px}
/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:#333;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:760px;max-height:88vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
.modal-hdr-title{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f5f5f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;transition:all .2s}
.modal-close:hover{background:#eee;color:#333}
.modal-body{padding:24px}
/* pdf viewer */
.pdf-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.pdf-section-title{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.pdf-preview{background:#f9f9f9;border-radius:8px;padding:12px;font-size:12px;color:#555;line-height:1.7;max-height:150px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border)}
/* divider */
.divider{border-top:1px dashed var(--border);margin:16px 0}
/* method detail */
.method-detail{font-size:12px;color:var(--text2);line-height:1.6;padding:8px 12px;background:#f9f9f9;border-radius:6px;margin-top:6px;max-height:80px;overflow:hidden;position:relative}
.method-detail::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,#f9f9f9)}
/* no data */
.no-data{text-align:center;padding:30px;color:#ccc;font-size:13px}
/* responsive */
@media(max-width:640px){
  .form-grid{grid-template-columns:1fr}
  .controls-row{flex-direction:column;gap:10px}
  .platform-btns{flex-direction:column}
  .nav-tabs{flex-wrap:wrap}
  .header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🔥 口碑评论生成器</h1>
    <div class="header-right">
      <button class="btn btn-o" onclick="openModal('methodModal')">📖 方法论库</button>
      <button class="btn btn-o" onclick="openModal('feedbackModal')">💬 修改意见</button>
      <button class="btn btn-o" onclick="exportAll()">📤 导出全部</button>
      <button class="btn btn-o" onclick="document.getElementById('importAllInput').click()">📥 导入</button>
      <input type="file" id="importAllInput" accept=".json" style="display:none" onchange="importAll(event)">
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('generator',this)">✨ 生成文案</button>
    <button class="nav-tab" onclick="switchTab('management',this)">⚙ 管理后台</button>
    <button class="nav-tab" onclick="switchTab('settings',this)">🔑 设置</button>
  </nav>

  <!-- ===== 生成区 ===== -->
  <section class="section active" id="tab-generator">

    <!-- 产品选择条 -->
    <div class="select-bar">
      <div class="select-row">
        <span class="select-label">当前产品：</span>
        <div class="product-chips" id="productChips">
          <span class="no-product">还没有产品，点右上角「管理后台」添加</span>
        </div>
      </div>
      <div class="info-row" id="infoRow" style="display:none"></div>
    </div>

    <!-- 链接识别 -->
    <div class="card" id="linkCard" style="display:none">
      <div class="card-title">🔗 链接识别</div>
      <div class="link-row">
        <input type="url" id="linkInput" placeholder="粘贴小红书/B站/抖音链接，AI自动识别产品和平台">
        <button class="btn btn-p" onclick="analyzeLink()">识别</button>
      </div>
      <div class="link-status" id="linkStatus"></div>
    </div>

    <!-- 控制区 -->
    <div class="card">
      <div class="controls-row">
        <div class="tone-group">
          <span class="select-label" style="font-size:12px">🗣 白话</span>
          <input type="range" class="tone-slider" id="toneSlider" min="0" max="100" value="50" oninput="updateTone()">
          <span class="select-label" style="font-size:12px">专业 📊</span>
        </div>
        <div class="purchase-toggle">
          <button class="toggle-btn active" id="btn-no" onclick="setPurchased(false)">🔍 未购（决策向）</button>
          <button class="toggle-btn" id="btn-yes" onclick="setPurchased(true)">✅ 已购（体验向）</button>
        </div>
      </div>

      <div class="platform-btns">
        <button class="platform-btn bili-btn" onclick="generateFor('bili')">📺 生成B站评论</button>
        <button class="platform-btn douyin-btn" onclick="generateFor('douyin')">🎵 生成抖音评论</button>
        <button class="platform-btn xhs-btn" onclick="generateFor('xhs')">📕 生成小红书评论</button>
      </div>
    </div>

    <!-- 结果 -->
    <div class="result-area" id="resultArea">
      <div class="empty">
        <div class="empty-icon">📝</div>
        添加产品 → 选择产品 → 调好参数 → 点击平台按钮生成
      </div>
    </div>
    <div class="result-actions" id="resultActions" style="display:none">
      <button class="btn btn-p" onclick="copyAll()">📋 复制全部</button>
      <button class="btn btn-o" onclick="generateFor(curPlatform)">🔄 换一批</button>
    </div>
  </section>

  <!-- ===== 管理后台 ===== -->
  <section class="section" id="tab-management">

    <div class="mgr-tabs">
      <button class="mgr-tab active" onclick="switchMgrTab('products',this)">📦 产品管理</button>
      <button class="mgr-tab" onclick="switchMgrTab('methods',this)">📖 方法论</button>
      <button class="mgr-tab" onclick="switchMgrTab('feedbacks',this)">💬 修改意见</button>
      <button class="mgr-tab" onclick="switchMgrTab('categories',this)">🏷 品类管理</button>
    </div>

    <!-- 产品管理 -->
    <div id="mgr-products">
      <div class="card">
        <div class="card-title">➕ 添加产品</div>
        <div class="form-grid">
          <div class="form-g">
            <label>产品名称 *</label>
            <input type="text" id="prodName" placeholder="产品名称">
          </div>
          <div class="form-g">
            <label>品类</label>
            <select id="prodCat"></select>
          </div>
        </div>
        <div class="form-g">
          <label>核心卖点（每行一个）</label>
          <textarea id="prodFeatures" placeholder="三色激光&#10;2000CVIA亮度&#10;云台一体化设计&#10;杜比音响"></textarea>
        </div>
        <div class="form-grid">
          <div class="form-g">
            <label>价格区间</label>
            <input type="text" id="prodPrice" placeholder="如：4000-5000">
          </div>
          <div class="form-g">
            <label>参考链接</label>
            <input type="text" id="prodUrl" placeholder="产品页面链接">
          </div>
        </div>
        <div class="form-g">
          <label>产品描述（AI生成参考）</label>
          <textarea id="prodDesc" placeholder="描述产品的使用场景、目标用户等"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-o" onclick="clearProdForm()">清空</button>
          <button class="btn btn-p" onclick="saveProduct()">💾 保存产品</button>
        </div>
      </div>

      <div id="productList"></div>
    </div>

    <!-- 方法论 -->
    <div id="mgr-methods" style="display:none">
      <div class="card">
        <div class="card-title">➕ 添加方法论</div>
        <div class="form-g">
          <label>方法论名称 *</label>
          <input type="text" id="methodName" placeholder="如：B站测评风格、抖音带货风">
        </div>
        <div class="form-g">

function renderProductChips() {
  const prods = S.products();
  const chips = document.getElementById('productChips');
  if(!prods.length) {
    chips.innerHTML = '<span class="no-product">还没有产品，点右上角「管理后台」添加</span>';
    document.getElementById('infoRow').style.display = 'none';
    selectedProductId = null;
    return;
  }
  let html = '';
  prods.forEach(p => {
    const sel = p.id===selectedProductId ? ' selected' : '';
    html += `<span class="product-chip mine${sel}" onclick="selProduct('${p.id}')"><span class="dot"></span>${E(p.name)}<span class="tag">我品</span></span>`;
    (p.competitors||[]).forEach(c=>{
      const cid = p.id+'__c__'+c.id;
      const s2 = cid===selectedProductId ? ' selected' : '';
      html += `<span class="product-chip comp${s2}" onclick="selProduct('${cid}')"><span class="dot"></span>${E(c.name)}<span class="tag">竞品</span></span>`;
    });
  });
  chips.innerHTML = html;
  updateInfoRow();
  document.getElementById('linkCard').style.display = prods.length ? 'block' : 'none';
}
function selProduct(id) { selectedProductId = id; renderProductChips(); }

function getSelectedProductInfo() {
  if(!selectedProductId) return null;
  const prods = S.products();
  if(selectedProductId.includes('__c__')) {
    const [pid,cid] = selectedProductId.split('__c__');
    const parent = prods.find(p=>p.id===pid);
    if(!parent) return null;
    const comp = (parent.competitors||[]).find(c=>c.id===cid);
    return comp ? {...comp,isCompetitor:true,parentProduct:parent} : null;
  }
  return prods.find(p=>p.id===selectedProductId)||null;
}
function getProductPair() {
  const info = getSelectedProductInfo();
  if(!info) return null;
  if(info.isCompetitor) return {myProduct:info.parentProduct,comp:info};
  const comp = (info.competitors||[]).length ? R(info.competitors) : null;
  return {myProduct:info,comp};
}
function updateInfoRow() {
  const row = document.getElementById('infoRow');
  const p = getSelectedProductInfo();
  if(!p) {row.style.display='none';return;}
  const feats = (p.features||[]).slice(0,3).join(' · ')+((p.features||[]).length>3?' …':'');
  row.style.display = 'flex';
  row.innerHTML = `<span>📦 ${E(p.name)}（${E(p.category||'未分类')}）</span>${p.price?`<span>💰 ${E(p.price)}</span>`:''}${feats?`<span>🎯 ${E(feats)}</span>`:''}`;
}

    prods.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name,category,features,price,url,desc,competitors:[],materials:[],time:new Date().toISOString()});

  refreshProductList();

// ---- 产品资料（PDF/文本） ----
async function uploadMaterial(prodId, input) {
  const file = input.files[0]; if(!file) return;
  const text = await extractFileText(file);
  const prods = S.products();
  const p = prods.find(p=>p.id===prodId);
  if(!p) return;
  p.materials = p.materials||[];
  p.materials.push({id:Date.now(),name:file.name,text:text.substring(0,8000),time:new Date().toISOString()});
  S.save('products', prods);
  toast('资料已添加');
  refreshProductList();
  renderProductChips();
}

async function extractFileText(file) {
  if(file.name.endsWith('.pdf')) {
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
      let text = '';
      for(let i=1;i<=Math.min(pdf.numPages,20);i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it=>it.str).join(' ')+'\n';
      }
      return text.trim()||'（PDF提取失败，请手动输入内容）';
    } catch(e) { return '（PDF解析失败: '+e.message+'）'; }
  } else {
    return await file.text();
  }
}

}

async function analyzeLink() {
  const url = document.getElementById('linkInput').value.trim();
  if(!url) return;
  const status = document.getElementById('linkStatus');
  status.className = 'link-status show loading';
  status.textContent = '正在分析链接…';
  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const resp = await fetch(proxyUrl);
    const html = await resp.text();
    const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    const title = titleMatch ? titleMatch[1].trim() : '';

    // 识别产品
    const prods = S.products();
    let matched = null;
    for(const p of prods) {
      if(title.includes(p.name)||html.includes(p.name)) {matched=p;break;}
    }

    // 识别平台
    let detected = '';
    if(url.includes('xiaohongshu')||url.includes('xhs')) detected='xhs';
    else if(url.includes('bilibili')||url.includes('b23.tv')) detected='bili';
    else if(url.includes('douyin')) detected='douyin';

    if(matched) {
      selectedProductId = matched.id;
      renderProductChips();
      const platNames = {bili:'📺B站',douyin:'🎵抖音',xhs:'📕小红书'};
      status.className = 'link-status show ok';
      status.textContent = `✅ 已识别：${matched.name}${detected?' · '+platNames[detected]:''}`;
      if(detected) curPlatform = detected;
    } else {
      status.className = 'link-status show';
      status.textContent = title ? `📄 识别到：${title.substring(0,60)}（未匹配到产品，请先在管理后台添加）` : '⚠️ 未识别到内容，请在管理后台手动添加产品';
    }
  } catch(e) {
    status.className = 'link-status show err';
    status.textContent = '❌ 链接获取失败：'+e.message;
  }
}

// ================================================================
function analyzeProduct(info) {
  const {name,category,features,price,competitor,compFeatures} = info;
  const featStr = (features||[]).map(f=>f.toLowerCase()).join(' ');
  const p = parseInt(price)||0;
  let priceSeg = '中端';
  if(p>0&&p<2000) priceSeg='入门';
  else if(p>=2000&&p<5000) priceSeg='中端性价比';
  else if(p>=5000&&p<10000) priceSeg='中高端';
  else if(p>=10000) priceSeg='旗舰';

  const isProj=/投影/.test(category+name);
  const isTV=/电视/.test(category+name);
  const isAudio=/音响|音箱|耳机/.test(category+name);
  const isAc=/空调|新风/.test(category+name);
  const isWash=/洗衣机|烘干/.test(category+name);
  const isFridge=/冰箱/.test(category+name);

  const hotC=[];
  const addH=(re,w)=>{const f=features.find(f=>re.test(f));if(f) hotC.push({f,w});};
  if(isProj){
    addH(/cvia|ansi|流明|亮度|nit/i,10);
    addH(/激光|三色|光源|alpd/i,9);
    addH(/4k|分辨率|1080/i,7);
    addH(/云台|支架|便携|自动对焦|梯形|校正|无感/i,8);
    addH(/音响|哈曼|jbl|杜比|dolby|音质/i,6);
    addH(/护眼|低蓝光|莱茵|漫反射/i,7);
    addH(/游戏|延迟|低延迟|hdmi|memc/i,5);
  }
  if(isTV){
    addH(/4k|8k|oled|miniled|qled/i,10);
    addH(/音响|哈曼|回音壁/i,7);
    addH(/144hz|高刷|memc/i,6);
  }
  if(isAudio){
    addH(/降噪|anc/i,10);
    addH(/音质|解码|hi-res|金标/i,9);
    addH(/续航|电池|充电/i,7);
  }
  if(isAc){
    addH(/变频|省电|一级能效/i,9);
    addH(/冷暖|制冷|制热/i,8);
    addH(/新风|净化|除甲醛/i,8);
    addH(/静音|低噪/i,7);
  }
  if(isWash){addH(/烘干|热泵|洗烘/i,10);addH(/容量|10kg/i,7);}
  const covered=new Set(hotC.map(h=>h.f));
  (features||[]).forEach(f=>{if(!covered.has(f)) hotC.push({f,w:4});});

  let hp='',hp2='';
  if(hotC.length){
    let tw=hotC.reduce((s,c)=>s+c.w,0);
    let rl=Math.random()*tw;
    for(const c of hotC){rl-=c.w;if(rl<=0){hp=c.f;break;}}
    if(!hp&&hotC.length) hp=hotC[0].f;
    const p2=hotC.filter(c=>c.f!==hp);
    if(p2.length){let r2=Math.random()*p2.reduce((s,c)=>s+c.w,0);for(const c of p2){r2-=c.w;if(r2<=0){hp2=c.f;break;}}if(!hp2) hp2=p2[0].f;}
  }

  const myUnique=(features||[]).filter(f=>!(compFeatures||[]).some(cf=>f.includes(cf)||cf.includes(f)));
  const keyDiff=myUnique.length?R(myUnique):hp;
  const wknesses=[];
  if(isProj&&!/4k/i.test(featStr)&&p>3000) wknesses.push('纠结1080P还是4K要多考虑');
  if(isProj&&!/cvia|ansi/i.test(featStr)) wknesses.push('亮度参数没标清，白天能不能用是问号');
  if(isTV&&/广告/.test(featStr)) wknesses.push('开机有广告确实扣分');
  const weakness=wknesses.length?R(wknesses):'';

  return {hp,hp2,keyDiff,priceSeg,weakness,isProj,isTV,isAudio,isAc,isWash,isFridge};
}

function pickScene(info,a){
  const {isProj,isTV,isAudio,isAc}=a;
  const feats=(info.features||[]).map(f=>f.toLowerCase()).join(' ');
  const scenes=[];
  if(isProj){
    scenes.push({s:'晚上关灯看',d:'投白墙效果出乎意料的好'},{s:'白天拉窗帘',d:'亮度够用不用全黑'},{s:'卧室躺着看天花板',d:'云台直接对着天花板投'},{s:'周末连看三部电影',d:'眼睛不累，比电视舒服'},{s:'朋友来家看球',d:'大屏就是爽'},{s:'露营带出去',d:'便携确实方便'});
  } else if(isTV){
    scenes.push({s:'接游戏机打游戏',d:'延迟基本感觉不到'},{s:'客厅当家庭影院',d:'配回音壁效果炸裂'},{s:'老人看新闻',d:'操作简单他们也能用'});
  } else if(isAudio){
    scenes.push({s:'通勤路上',d:'降噪效果明显'},{s:'跑步健身戴着',d:'不容易掉，续航够用'},{s:'在家听歌',d:'音质比手机直推好太多'});
  } else if(isAc){
    scenes.push({s:'夏天制冷',d:'降温挺快的'},{s:'冬天制热',d:'热得挺快的'},{s:'晚上睡觉开',d:'确实安静，基本听不到声音'});
  }
  if(/护眼|小孩/i.test(feats)) scenes.push({s:'给娃用',d:'比看iPad强太多'});
  return scenes.length?R(scenes):{s:'日常使用',d:'整体满意'};
}

    text=R([`${info.name} ${them} ${R(['价格差不太多','预算都能接受'])} up最推荐哪一款 ${R(['我就下班在客厅看看电影','主要给爸妈用'])}`,`在${info.name}和${them}之间纠结 ${a.hp}这个我比较看重 ${R(['求真实建议','再看看 不过倾向这个'])}`]);
  } else if(style==='share'){
    const days=R(['两周','一个月','半个多月','一周多','三天']);
    const detail=R([`${scene.s} ${scene.d}`,`到手就试了${R(['投白墙','接switch'])} ${R(['效果比想象中好','没翻车','确实不错'])}`,`之前那台${R(['亮度完全不够','晚上都糊'])} 换了${info.name} ${R(['这才叫投影','差距太明显'])}`]);
    text=R([`用了${days} 说说感受 ${a.hp}确实不错 ${detail} ${info.competitor?`对比${info.competitor}选对了`:'没选错'}`,`${info.price?info.price+'入的':'之前买的'} 用了${days} ${detail} ${R(['可以放心冲','没什么槽点'])}`]);
  } else if(style==='evaluate'){
    const dur=isPurchased?`用了${R(['两周','一个月','半个多月','一周'])} `:'';
    const conc=isPurchased?R(['整体满意','没选错','可以入','不后悔']):R(['看着挺香','准备冲','大概率选这个了','再看看 不过倾向这个']);
    text=R([`${dur}${featLine} ${a.priceSeg} ${R(['横向看了下确实能打','参数没虚标'])} ${scene.s} ${scene.d} ${compRef} ${conc}`,`${dur}说下${featLine}的真实感受 ${R(['不像有些牌子参数看着高实际拉胯','不是参数党 但用起来确实不一样'])} ${scene.d} ${compRef} ${conc}`]);
    if(!isPurchased&&!text.includes('？')&&Math.random()>.3) text+=' '+R(['有没有到手的兄弟说下','到手的兄弟实测一下','在线等一个真实评价']);
  } else {
    text=R([`${info.name} ${a.hp}怎么样 ${R(['有没有用过的兄弟','到手的说说','求真实评价'])}`,`有没有懂哥 ${info.name}的${a.hp}什么水平 ${info.competitor?`和${info.competitor}比呢`:''}`]);
  }

  if(casual){text=text.replace(/确实/g,'真的');if(Math.random()>.5&&!text.includes('doge')&&!text.includes('？')&&!text.includes('兄弟')) text+=' [doge]';text=text.replace(/性价比/g,'值不值');}
  if(pro){text=text.replace(/香麻了|太能打了|真的顶|绝了|真香/g,'参数到位');text=text.replace(/闭眼入/g,'推荐入手');}

  return{text:text.trim(),name:R(NAMES_B),color:AVATAR_COLORS[idx%AVATAR_COLORS.length],likes:RI(50,3200),hours:RI(1,12),platform:'bili'};
}

// ---- 抖音 ----
const PD=[{o:'直接冲了',a:'不纠结'},{o:'刷到就下单了',a:'希望别翻车'},{o:'用了告诉你',a:'真香/真坑'},{o:'不整那些虚的',a:'说大白话'},{o:'晚上窝沙发看',a:'沉浸感拉满'},{o:'打工人犒劳自己',a:'下班回家就想躺平看'},{o:'买了给娃看动画',a:'护眼很重要'},{o:'打游戏延迟重要',a:'实测延迟能接受'}];

function genDouyin(info,idx){
  const a=analyzeProduct(info);
  const per=PD[idx%PD.length];
  const casual=toneLevel<35,pro=toneLevel>65;
  const scene=pickScene(info,a);
  const featLine=a.hp+(a.hp2?`+${a.hp2}`:'');
  const compRef=info.competitor?R([`比${info.competitor}${R(['强多了','实在多了'])}`,`${info.competitor}看完直接放弃了`]):'';

  const openPool=isPurchased?[
    ()=>`${per.o} ${featLine} ${R(['真没翻车','没让人失望','值了'])}`,
    ()=>`用了${R(['两周','一个月','半个月'])} ${featLine} ${R(['确实能打','没有虚标','比想象的好'])}`,
  ]:[
    ()=>`刷到了 ${per.a}`,
    ()=>`${per.o} 这个看着行不行`,
    ()=>'这个到底行不行 有没有踩坑的',
  ];

  let text=pick(openPool)()+'。'+R([
    `${a.hp}在这个价位 ${R(['香麻了','太能打了','真的顶'])} ${scene.s}`,
    `${a.hp} ${R(['闭眼入','看参数就知道','实测没翻车'])}`,
    `就冲${a.hp}这一点 ${R(['值了','够了','比我想的好'])}`,
    `${featLine} 这个配置 ${R(['真卷','杀疯了'])}`,
  ])+'。'+R(isPurchased?['早买早享受','这波不亏','放心入 没什么坑','基本满意']:['冲不冲兄弟们','已经下了 到货拍视频','评论区蹲一个真实用户']);

  if(casual){text=text.replace(/确实/g,'真的');if(!text.endsWith('！')&&Math.random()>.6) text+='！';}
  if(pro){text=text.replace(/香麻了|太能打了|真的顶|绝了|真香/g,'参数能打');text=text.replace(/闭眼入/g,'可入');}

  return{text:text.trim(),name:R(NAMES_D),color:AVATAR_COLORS[idx%AVATAR_COLORS.length],likes:RI(20,5000),hours:RI(1,8),platform:'douyin'};
}

// ---- 小红书 ----
const PX=[{o:'被种草很久终于下手了',a:'来说说真实感受'},{o:'做了一周功课才选的',a:'选品思路分享'},{o:'小白第一次买',a:'需要姐妹们给建议'},{o:'第N台了',a:'这次确实不一样'},{o:'新家装修选了它',a:'和整体风格很搭'},{o:'一个人住',a:'提升幸福感的好物'},{o:'送给朋友/爸妈的',a:'他们反馈说'},{o:'看到好多人推荐就买了',a:'没让人失望'}];

function genXhs(info,idx){
  const a=analyzeProduct(info);
  const per=PX[idx%PX.length];
  const casual=toneLevel<35,pro=toneLevel>65;
  const featLine=a.hp+(a.hp2?`配合${a.hp2}`:'');

  const openPool=isPurchased?[
    ()=>`用了${R(['两周','一个月'])} 来repo ${per.a}`,
    ()=>`${per.o} 来分享下真实感受 ✨`,
    ()=>R(['真实用户反馈 不是广','自己买的 真诚分享']),
  ]:[
    ()=>`${per.o} 姐妹们帮我看看 ✨`,
    ()=>`🔥种草好久了 ${per.a}`,
    ()=>`👀做了功课 ${per.a}这个可以入吗`,
  ];

  const insightPool=[
    ()=>`${a.hp}这个体验 ${R(['太加分了','提升幸福感','每天都在用'])} ${featLine} ${R(['绝绝子','太舒服了','爱了爱了'])}`,
    ()=>`对比了${info.competitor||'别家'} ${a.hp}确实是${info.name}的亮点 ${info.competitor?`${info.competitor}没有这个`:'其他家目前给不到'}`,
    ()=>`${a.hp} ${R(['真不是参数党','用起来才知道多香','解决了我最大的痛点'])} ${a.priceSeg}能有这个 真的可以`,
  ];

  let text=pick(openPool)()+'。'+pick(insightPool)()+'。'+R(isPurchased?['闭眼入没毛病 ✨','提升生活幸福感的好物 推荐！','之后继续分享使用感受~','真的不后悔 ✨']:[info.price?`${info.price}值得冲吗姐妹们 🥺`:`家人们觉得值吗`,'有没有买过的姐妹给个建议 🥺','周末去线下看看再决定']);

  if(casual){text=text.replace(/绝绝子/g,'真的太棒了').replace(/幸福感/g,'太幸福了');}
  if(pro){text=text.replace(/绝绝子|爱了|种草|太舒服了/g,'参数到位');if(Math.random()>.5) text+=' 做了详细功课才选的';}

  return{text:text.trim(),name:R(NAMES_X),color:AVATAR_COLORS[idx%AVATAR_COLORS.length],likes:RI(10,800),hours:RI(1,24),platform:'xhs'};
}

// ================================================================
// 生成入口
// ================================================================
function generateFor(platform) {
  curPlatform = platform;
  const pair = getProductPair();
  if(!pair) {toast('请先选择一个产品');return;}

  const info = {
    name: pair.myProduct.name,
    category: pair.myProduct.category||'',
    features: pair.myProduct.features||[],
    price: pair.myProduct.price||'',
    url: pair.myProduct.url||'',
    desc: pair.myProduct.desc||'',
    materials: pair.myProduct.materials||[],
    competitor: pair.comp?pair.comp.name:'',
    compFeatures: pair.comp?(pair.comp.features||[]):[],
    compPrice: pair.comp?(pair.comp.price||''):'',
  };

  // 如果有资料，注入前500字作为上下文
  if(info.materials?.length) {
    const matText = info.materials.map(m=>`【${m.name}】${m.text.substring(0,300)}`).join('\n');
    // 在卖点中混入资料内容（真实感增强）
    const matFeatures = matText.split(/[，。\n]/).filter(s=>s.length>5&&s.length<30).slice(0,5);
    info.features = [...new Set([...info.features,...matFeatures])];
  }

  // 注入方法论提示
  const activeMethods = S.methods().filter(m=>m.active&&(!m.platform||m.platform===platform));
  const methodHint = activeMethods.length ? '\n方法论参考：'+activeMethods.map(m=>m.content).join('；') : '';

  // 注入修改意见
  const pendingFbs = S.feedback().filter(f=>!f.processed&&f.prod===info.name);
  const fbHint = pendingFbs.length ? '\n用户反馈：'+pendingFbs.map(f=>f.text).join('；') : '';

  // 生成
  const generators = {bili:genBili,douyin:genDouyin,xhs:genXhs};
  curComments = [];
  const cnt = Math.min(genCount, 15);
  for(let i=0;i<cnt;i++) curComments.push(generators[platform](info,i));
  renderComments();
  document.getElementById('resultActions').style.display = 'flex';
}

// ================================================================
// 渲染评论
// ================================================================
function renderComments() {
  const area = document.getElementById('resultArea');
  const badges = {bili:'<span class="badge b-bili">📺 B站评论</span>',douyin:'<span class="badge b-douyin">🎵 抖音评论</span>',xhs:'<span class="badge b-xhs">📕 小红书评论</span>'};
  const stat = isPurchased?'<span style="font-size:11px;color:#10b981;margin-left:8px">✅ 已购 · 体验向</span>':'<span style="font-size:11px;color:#f59e0b;margin-left:8px">🔍 未购 · 决策向</span>';
  const tone = `<span style="font-size:11px;color:#888;margin-left:4px">语调${toneLevel<35?'偏口语':toneLevel>65?'偏专业':'适中'}</span>`;

  area.innerHTML = `<div style="margin-bottom:12px">${badges[curPlatform]}${stat}${tone}</div>`+renderers[curPlatform](curComments);
}

const renderers = {
  bili: c => c.map(x=>{
    const t=E(x.text).replace(/'/g,"&#39;");
    return `<div class="cc-wrap bc">
      <div class="bc-avatar" style="background:${x.color}">${x.name[0]}</div>
      <div style="flex:1">
        <div class="bc-name">${E(x.name)}</div>
        <div class="bc-text">${E(x.text)}</div>
        <div class="bc-meta"><span>👍 ${x.likes>=1000?(x.likes/1000).toFixed(1)+'k':x.likes}</span><span>${x.hours}小时前</span></div>
      </div>
      <button class="copy-btn" onclick="copyOne(this,'${t}')">复制</button>
    </div>`;
  }).join(''),
  douyin: c => c.map(x=>{
    const t=E(x.text).replace(/'/g,"&#39;");
    return `<div class="cc-wrap dc">
      <div class="dc-avatar" style="background:${x.color}">${x.name[0]}</div>
      <div style="flex:1">
        <div class="dc-name">${E(x.name)}</div>
        <div class="dc-text">${E(x.text)}</div>
        <div class="dc-meta"><span>${x.hours}小时前</span><span class="dc-heart ${Math.random()>.5?'liked':''}">♡ ${x.likes>=1000?(x.likes/1000).toFixed(1)+'k':x.likes}</span></div>
      </div>
      <button class="copy-btn" onclick="copyOne(this,'${t}')">复制</button>
    </div>`;
  }).join(''),
  xhs: c => c.map(x=>{
    const t=E(x.text).replace(/'/g,"&#39;");
    return `<div class="cc-wrap xc">
      <div class="xc-header">
        <div class="xc-avatar" style="background:${x.color}">${x.name[0]}</div>
        <div class="xc-name">${E(x.name)}</div>
      </div>
      <div class="xc-text">${E(x.text)}</div>
      <div class="xc-meta"><span>${x.hours}小时前</span><span>♡ ${x.likes}</span></div>
      <button class="copy-btn" onclick="copyOne(this,'${t}')">复制</button>
    </div>`;
  }).join(''),
};

function copyOne(btn,text){
  navigator.clipboard.writeText(text.replace(/&#39;/g,"'")).then(()=>toast('已复制'));
}
function copyAll(){
  navigator.clipboard.writeText(curComments.map(c=>c.text).join('\n')).then(()=>toast('已复制全部'));
}

// ================================================================
// 弹窗
// ================================================================
function openModal(id){
  document.getElementById(id).classList.add('show');
  if(id==='methodModal') renderMethodModal();
  if(id==='feedbackModal') renderFeedbackModal();
}
function closeModal(id){
  document.getElementById(id).classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'))}});

function renderMethodModal(){
  const methods=S.methods();
  const platMap={bili:'📺B站',douyin:'🎵抖音',xhs:'📕小红书','':'🌐通用'};
  document.getElementById('methodModalBody').innerHTML = methods.length ? methods.map(m=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">${E(m.name)}</div>
          <div style="margin-bottom:6px">
            <span class="tag ${m.active?'tag-p':'tag-d'}">${m.active?'✅ 启用':'⛔ 停用'}</span>
            <span class="tag tag-a">${platMap[m.platform]||'通用'}</span>
          </div>
          <div style="font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap">${E(m.content)}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button class="btn-sm ${m.active?'d':'s'}" onclick="toggleMethod(${m.id});renderMethodModal()">${m.active?'停用':'启用'}</button>
          <button class="btn-sm d" onclick="deleteMethod(${m.id});renderMethodModal()">删除</button>
        </div>
      </div>
    </div>
  `).join('') : '<div class="no-data">暂无方法论</div>';
}

function renderFeedbackModal(){
  const fbs=S.feedback();
  document.getElementById('feedbackModalBody').innerHTML = fbs.length ? fbs.map(f=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600;margin-bottom:3px">${E(f.prod||'通用产品')}</div>
          <div style="margin-bottom:6px">
            <span class="tag ${f.processed?'tag-p':'tag-d'}">${f.processed?'✅ 已处理':'⏳ 待处理'}</span>
          </div>
          ${f.original?`<div style="font-size:12px;color:#555;padding:6px 10px;background:#f9f9f9;border-radius:6px;margin-bottom:6px"><strong>原文：</strong>${E(f.original.substring(0,100))}</div>`:''}
          <div style="font-size:13px;padding:8px 12px;background:#fff7e6;border-radius:6px;border-left:3px solid #f59e0b">💬 ${E(f.text)}</div>
          <div style="font-size:11px;color:#bbb;margin-top:4px">${fmt(f.time)}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;flex-direction:column">
          ${!f.processed?`<button class="btn-sm s" onclick="processFeedback(${f.id});renderFeedbackModal()">标为已处理</button>`:''}
          <button class="btn-sm d" onclick="deleteFeedback(${f.id});renderFeedbackModal()">删除</button>
        </div>
      </div>
    </div>
  `).join('') : '<div class="no-data">暂无修改意见</div>';
}
